<!doctype html>
<html lang="uk"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <title>Реєстрація</title>
</head>
<body>
<div layout:fragment="content" class="relative flex flex-col items-center justify-center w-full mt-10">
  <div class="bg-white/70 backdrop-blur-md rounded-2xl shadow-2xl p-8 w-full max-w-md">
    <h1 class="text-3xl font-bold text-center text-green-700 mb-6">Реєстрація</h1>

    <div th:if="${error}" class="bg-red-100 border border-red-300 text-red-700 rounded-lg px-4 py-3 mb-4 text-center">
      <p th:text="${error}"></p>
    </div>

    <form class="space-y-5" th:action="@{/register}" th:object="${user}" method="post">

      <div>
        <label for="username" class="block text-green-800 font-medium mb-1">Ім'я користувача</label>
        <input id="username" type="text" th:field="*{username}" placeholder="Логін"
               class="w-full px-4 py-2 border border-green-300 rounded-lg focus:ring-2 focus:ring-green-400 focus:outline-none">
        <p th:errors="*{username}" class="text-red-500 text-sm mt-1"></p>
      </div>

      <div>
        <label for="email" class="block text-green-800 font-medium mb-1">Email</label>
        <input id="email" type="email" th:field="*{email}" placeholder="email@example.com"
               class="w-full px-4 py-2 border border-green-300 rounded-lg focus:ring-2 focus:ring-green-400 focus:outline-none">
        <p th:errors="*{email}" class="text-red-500 text-sm mt-1"></p>
      </div>

      <div>
        <label for="password" class="block text-green-800 font-medium mb-1">Пароль</label>
        <input id="password" type="password" th:field="*{password}" placeholder="Мінімум 6 символів"
               class="w-full px-4 py-2 border border-green-300 rounded-lg focus:ring-2 focus:ring-green-400 focus:outline-none">
        <p th:errors="*{password}" class="text-red-500 text-sm mt-1"></p>
      </div>

      <div>
        <label for="confirmPassword" class="block text-green-800 font-medium mb-1">Підтвердження пароля</label>
        <input id="confirmPassword" type="password" th:field="*{confirmPassword}" placeholder="Повторіть пароль"
               class="w-full px-4 py-2 border border-green-300 rounded-lg focus:ring-2 focus:ring-green-400 focus:outline-none">
      </div>

      <button type="submit"
              class="w-full bg-green-600 text-white py-2 rounded-lg font-semibold hover:bg-green-700 transition">
        Зареєструватись
      </button>

    </form>

    <div class="text-center mt-4 text-green-700 font-medium">
      <p th:if="${param.registered}" class="text-green-600 mb-2">Реєстрація успішна! Увійдіть в акаунт.</p>
      <p>
        Вже є акаунт?
        <a th:href="@{/login}" class="text-green-700 font-semibold hover:underline">Увійти</a>
      </p>
    </div>

  </div>
</div>
</body>
</html>
