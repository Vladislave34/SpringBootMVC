
<!doctype html>
<html lang="uk"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
<div layout:fragment="content">

    <div th:if="${#lists.isEmpty(songs)}">
        <p class="text-gray-500">Пісні відсутні</p>
    </div>
    <ul class="list-disc pl-6" th:if="${!#lists.isEmpty(songs)}">
        <li th:each="song : ${songs}" class="mb-2">
            <span class="font-bold" th:text="${song.name}"></span>
            <div class="text-gray-600">
        <span th:each="genre, iter : ${song.genres}">
            <span th:text="${genre.name}"></span>
            <span th:if="${!iter.last}">, </span>
        </span>
            </div>
        </li>
    </ul>
</div>
</body>
</html>
